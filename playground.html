  <style>
    @font-face {
      font-family: 'Awesome';

      font-style: normal;

    @font-face {

    @font-face {

      font-style: normal;
    }

    @font-face {
      font-family: 'Manrope-Medium';
      src: url('fonts/Manrope-Medium.ttf') format('truetype');
      font-weight: 500;
      font-style: normal;
    }

    :root {
      --bg: #f5f5f7;
      --bg-elevated: #ffffff;
      --bg-section: #f9fafb;
      --bg-gradient-start: #ffffff;
      --bg-gradient-end: #f5f5f7;
      --border-subtle: rgba(0, 0, 0, 0.06);
      --text-main: #2f332f;
      --text-muted: #7a7a80;
      --accent: #0071e3;
      --accent-soft: rgba(0, 113, 227, 0.08);
      --nav-bg: rgba(245, 245, 247, 0.55);
      --nav-bg-scrolled: rgba(245, 245, 247, 0.75);
      --logo-bg: rgba(255, 255, 255, 0.9);
      --shadow-sm: 0 0 0 1px rgba(255, 255, 255, 0.7), 0 6px 12px rgba(0, 0, 0, 0.12);
      --shadow-md: 0 14px 40px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.03);
      --radius-lg: 20px;
      --radius-xl: 28px;
      --transition-fast: 180ms ease-out;
      --marquee-duration: 45s;
    }

    body.dark-mode {
      --bg: #0a0a0f;
      --bg-elevated: #1a1a24;
      --bg-section: #14141f;
      --bg-gradient-start: #1a1a24;
      --bg-gradient-end: #0a0a0f;
      --text-main: #e8e8ed;
      --text-muted: #9a9aa5;
      --accent: #4a9eff;
      --accent-soft: rgba(74, 158, 255, 0.15);
      --nav-bg: rgba(10, 10, 15, 0.55);
      --nav-bg-scrolled: rgba(10, 10, 15, 0.75);
      --logo-bg: rgba(26, 26, 36, 0.9);
      --shadow-sm: 0 0 0 1px rgba(255, 255, 255, 0.05), 0 6px 12px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 14px 40px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      min-height: 100%;
    }

    body {
      font-family: "Manrope-Medium", system-ui, sans-serif;
      background: radial-gradient(circle at top, var(--bg-gradient-start) 0, var(--bg-gradient-end) 52%);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      padding-top: 72px;
      transition: background 0.3s ease, color 0.3s ease;
      cursor: none;
      position: relative;
      min-height: 100vh;
    }

    /* Paper texture overlay - scrolls with content, crisp and continuous */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url('img/paper.png');
      background-repeat: repeat;
      background-size: 500px 593px;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    body.dark-mode::before {
      opacity: 0.18;
    }

    /* Ensure all direct children of body are above the texture */
    body > * {
      position: relative;
      z-index: 1;
    }

    /* Custom Cursor */
    * {
      cursor: none !important;
    }
    
    .custom-cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      border-radius: 9999px;
      pointer-events: none;
      z-index: 2147483647;
      transform: translate(-50%, -50%);
      background: #2f332f;
      border: 2px solid #ffffff;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.1);
      will-change: transform;
      opacity: 1;
      display: block;
      visibility: visible;
    }

    body.dark-mode .custom-cursor {
      background: #e8e8ed;
      border: 2px solid #0a0a0f;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    body.hovering-link .custom-cursor {
      transform: translate(-50%, -50%) scale(1.3);
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* NAVBAR - match home */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      display: flex;
      justify-content: center;
      padding: 24px 48px;
      pointer-events: none;
      transition: all 0.35s ease;
    }

    .nav__inner {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      padding-bottom: 16px;
      pointer-events: auto;
      background: transparent;
      transition: all 0.35s ease;
    }

    body.dark-mode .nav__inner {
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .nav.nav--floating {
      top: 0;
    }

    .nav.nav--floating .nav__inner {
      max-width: 760px;
      padding: 10px 24px;
      border-bottom: none;
      border-radius: 999px;
      background: rgba(230, 230, 235, 0.9);
      border: 1px solid rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.16);
    }

    body.dark-mode .nav.nav--floating .nav__inner {
      background: rgba(20, 20, 25, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.5);
    }

    .nav-left,
    .nav-right {
      display: flex;
      align-items: center;
      gap: 24px;
      transition: gap 0.25s ease;
    }

    .nav-center {
      display: flex;
      align-items: center;
      gap: 24px;
      transition: gap 0.25s ease;
    }

    .nav.nav--floating .nav-left,
    .nav.nav--floating .nav-right {
      gap: 16px;
    }

    .nav.nav--floating .nav-center {
      gap: 16px;
    }

    .nav.nav--floating .nav-left {
      padding-right: 20px;
      margin-right: 16px;
      border-right: 1px solid rgba(0, 0, 0, 0.08);
    }

    body.dark-mode .nav.nav--floating .nav-left {
      border-right-color: rgba(255, 255, 255, 0.12);
    }

    .brand-logo-link {
      display: inline-flex;
      align-items: center;
    }

    .brand-logo {
      height: 40px;
      width: auto;
      display: block;
    }

    .nav-link-group {
      display: flex;
      gap: 24px;
      font-size: 15px;
      color: var(--text-main);
      opacity: 1;
    }

    .nav-link {
      font-family: "Manrope-Medium", system-ui, sans-serif;
      position: relative;
      padding: 4px 0;
      cursor: pointer;
      text-decoration: none;
      color: var(--text-main);
    }

    .nav-link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0;
      height: 2.5px;
      border-radius: 999px;
      background: #c92380;
      transition: width var(--transition-fast);
    }

    .nav-link:hover::after {
      width: 100%;
    }

    .nav-link.nav-link--primary {
      padding: 6px 14px;
      border-radius: 999px;
      background: #c92380;
      color: var(--bg-elevated);
      font-size: 14px;
      transition: opacity var(--transition-fast), background var(--transition-fast);
    }

    .nav-link.nav-link--primary:hover {
      opacity: 0.85;
      background: #b01e6f;
    }

    .nav-link.nav-link--primary::after {
      display: none;
    }

    .dark-mode-toggle {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: var(--logo-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform var(--transition-fast), background var(--transition-fast);
      border: none;
      color: var(--text-main);
    }

    .dark-mode-toggle:hover {
      transform: scale(1.1);
    }

    .dark-mode-toggle svg {
      width: 18px;
      height: 18px;
      transition: transform 0.3s ease;
    }

    .dark-mode-toggle:active svg {
      transform: rotate(180deg);
    }

    /* ===== PLAYGROUND PAGE (scoped) ===== */
    .playground-page .playground-header {
      padding: 80px 0 40px;
      text-align: center;
    }

    .playground-page .playground-header h1 {
      font-family: 'Freight Text Pro Semibold', serif;
      font-size: clamp(48px, 6vw, 72px);
      line-height: 1.05;
      letter-spacing: -0.035em;
      margin-bottom: 16px;
      color: var(--text-main);
    }

    .playground-page .playground-header p {
      font-size: 17px;
      line-height: 1.75;
      color: var(--text-muted);
      max-width: 55ch;
    }

    /* Marquee columns */
    .playground-marquee {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding-bottom: 80px;
    }

    .playground-marquee__col {
      overflow: hidden;
      height: 85vh;
      position: relative;
    }

    .playground-marquee__col::before,
    .playground-marquee__col::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 80px;
      z-index: 2;
      pointer-events: none;
    }

    .playground-marquee__col::before {
      top: 0;
      background: linear-gradient(to bottom, var(--bg-gradient-end) 0%, transparent 100%);
    }

    .playground-marquee__col::after {
      bottom: 0;
      background: linear-gradient(to top, var(--bg-gradient-end) 0%, transparent 100%);
    }

    .playground-marquee__track {
      display: flex;
      flex-direction: column;
      gap: 20px;
      will-change: transform;
    }

    .playground-marquee__col--up .playground-marquee__track {
      animation: marqueeUp var(--marquee-duration) linear infinite;
    }

    .playground-marquee__col--down .playground-marquee__track {
      animation: marqueeDown var(--marquee-duration) linear infinite;
    }

    .playground-marquee__col:hover .playground-marquee__track {
      animation-play-state: paused;
    }

    @keyframes marqueeUp {
      0%   { transform: translateY(0); }
      100% { transform: translateY(calc(-50% - 12px)); }
    }

    @keyframes marqueeDown {
      0%   { transform: translateY(calc(-50% - 12px)); }
      100% { transform: translateY(0); }
    }

    .playground-item {
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: block;
      text-decoration: none;
      flex-shrink: 0;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: var(--shadow-md);
    }

    .playground-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
    }

    .playground-item img,
    .playground-item video {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    .playground-item {
      position: relative;
    }

    .playground-sound-toggle {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 3;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 5px 10px;
      font-family: 'Manrope-Medium', system-ui, sans-serif;
      font-size: 13px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s ease, background 0.2s ease;
      pointer-events: auto;
      line-height: 1;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .playground-item:hover .playground-sound-toggle {
      opacity: 1;
    }

    .playground-sound-toggle:hover {
      background: rgba(0, 0, 0, 0.75);
    }

    .playground-sound-toggle:focus-visible {
      opacity: 1;
      outline: 2px solid #fff;
      outline-offset: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      .playground-marquee__track {
        animation: none !important;
      }
      .playground-marquee__col {
        height: auto;
        overflow: visible;
      }
      .playground-marquee__col::before,
      .playground-marquee__col::after {
        display: none;
      }
    }

        /* FOOTER */
    footer {

    .footer-inner {

      user-select: none;

      font-family: 'Freight Text Pro Semibold', serif;
      font-size: clamp(34px, 4vw, 48px);
      font-weight: 600;
      letter-spacing: -0.03em;
      white-space: nowrap;
    }

    .footer-links {
      display: flex;
      gap: 36px;
    }

    .footer-link {
      font-family: 'Manrope-Medium', system-ui, sans-serif;
      font-size: clamp(16px, 1.5vw, 19px);
      color: var(--text-muted);
      position: relative;
      padding: 6px 0;
    }

    .footer-link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 0;
      height: 2px;
      border-radius: 999px;
      background: #c92380;
      transition: width var(--transition-fast);
    }

    .footer-link:hover::after {
      width: 100%;
    }

    .footer-meta {
      font-family: 'Manrope-Medium', system-ui, sans-serif;
      font-size: clamp(13px, 1.1vw, 15px);
      line-height: 1.7;
      color: var(--text-muted);
      opacity: 0.7;
      margin-top: 8px;
    }

    .footer-image-wrap {
      flex: 0 0 auto;
      display: flex;
      align-items: flex-end;
      overflow: visible;
    }

    .footer-sticker-link {
      display: block;
      cursor: pointer;
      transition: transform 0.25s ease;
    }

    .footer-sticker-link:hover {
      animation: footerStickerSwing 0.5s ease-in-out;
    }

    .footer-sticker-link:focus-visible {
      outline: 2px solid var(--text-main);
      outline-offset: 4px;
      border-radius: 8px;
    }

    .footer-sticker-link.is-clicked .footer-image {
      animation: footerStickerPop 0.35s ease-out;
    }

    @keyframes footerStickerSwing {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-4deg); }
      50% { transform: rotate(2deg); }
      75% { transform: rotate(-1deg); }
    }

    @keyframes footerStickerPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.08); }
      70% { transform: scale(0.98); }
      100% { transform: scale(1); }
    }

    .footer-image {
      width: 100%;
      max-width: 440px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 26px 60px rgba(0, 0, 0, 0.22));
    }


    @media (max-width: 900px) {
            .footer-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .footer-image {
        max-width: 340px;
      }
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .playground-page .playground-header {
        padding: 60px 0 32px;
      }

      .playground-marquee {
        grid-template-columns: 1fr;
        padding-bottom: 48px;
      }

      .playground-marquee__col {
        height: 60vh;
      }
    }
  </style>

  <script>
    // Register GSAP plugin
    gsap.registerPlugin(ScrollTrigger);

    // Clone marquee track children for seamless loop (idempotent via data-cloned flag)
    document.querySelectorAll('.playground-marquee__track[data-clone]').forEach(track => {
      if (track.dataset.cloned) return;
      const items = Array.from(track.children);
      items.forEach(item => {
        const clone = item.cloneNode(true);
        const vid = clone.querySelector('video');
        if (vid) {
          vid.muted = true;
          vid.play().catch(() => {});
        }
        track.appendChild(clone);
      });
      track.dataset.cloned = 'true';
    });

    // Sound toggle: unmute one video → mute all others (event delegation)
    document.querySelector('.playground-marquee')?.addEventListener('click', function(e) {
      const btn = e.target.closest('.playground-sound-toggle');
      if (!btn) return;
      e.preventDefault();
      e.stopPropagation();

      const video = btn.parentElement.querySelector('video');
      if (!video) return;

      const willUnmute = video.muted;

      if (willUnmute) {
        document.querySelectorAll('.playground-marquee video').forEach(v => {
          v.muted = true;
        });
        document.querySelectorAll('.playground-sound-toggle').forEach(b => {
          b.textContent = '\u{1F507}';
          b.setAttribute('aria-label', 'Unmute video');
          b.setAttribute('aria-pressed', 'false');
        });
      }

      video.muted = !willUnmute;
      btn.textContent = willUnmute ? '\u{1F50A}' : '\u{1F507}';
      btn.setAttribute('aria-label', willUnmute ? 'Mute video' : 'Unmute video');
      btn.setAttribute('aria-pressed', willUnmute ? 'true' : 'false');
    });

    // Dark mode - apply saved preference
    const savedDarkMode = localStorage.getItem('darkMode') === 'enabled';
    if (savedDarkMode) {
      document.body.classList.add('dark-mode');
    }
    
    // Setup toggle if it exists
    const darkModeToggle = document.getElementById('darkModeToggle') || document.querySelector('.dark-mode-toggle');
    if (darkModeToggle) {
      const sunIcon = document.querySelector('.sun-icon');
      const moonIcon = document.querySelector('.moon-icon');
      
      if (savedDarkMode && sunIcon && moonIcon) {
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
      }
      
      darkModeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        
        if (sunIcon && moonIcon) {
          if (document.body.classList.contains('dark-mode')) {
            localStorage.setItem('darkMode', 'enabled');
            sunIcon.style.display = 'none';
            moonIcon.style.display = 'block';
          } else {
            localStorage.setItem('darkMode', 'disabled');
            sunIcon.style.display = 'block';
            moonIcon.style.display = 'none';
          }
        }
      });
    }

    // Scroll detection for nav - floating pill state
    const nav = document.getElementById('nav');
    
    function handleNavbarScroll() {
      if (window.scrollY > 80) {
        nav.classList.add('nav--floating');
      } else {
        nav.classList.remove('nav--floating');
      }
    }
    
    let navTicking = false;
    window.addEventListener('scroll', () => {
      if (!navTicking) {
        window.requestAnimationFrame(() => {
          handleNavbarScroll();
          navTicking = false;
        });
        navTicking = true;
      }
    });
    handleNavbarScroll();

    // Footer sticker click pop
    const footerStickerLink = document.querySelector('.footer-sticker-link');
    if (footerStickerLink) {
      footerStickerLink.addEventListener('click', function () {
        this.classList.add('is-clicked');
        setTimeout(() => this.classList.remove('is-clicked'), 350);
      });
    }

    // Footer animations - match other pages
    gsap.from(".footer-heading", {
      scrollTrigger: {
        trigger: "footer",
        start: "top 80%",
        toggleActions: "play none none reverse"
      },
      opacity: 0,
      x: -50,
      duration: 1,
      ease: "power3.out"
    });

    gsap.from(".footer-text", {
      scrollTrigger: {
        trigger: "footer",
        start: "top 80%",
        toggleActions: "play none none reverse"
      },
      opacity: 0,
      y: 20,
      duration: 0.7,
      delay: 0.15,
      ease: "power2.out"
    });

    gsap.from(".footer-image", {
      scrollTrigger: {
        trigger: "footer",
        start: "top 80%",
        toggleActions: "play none none reverse"
      },
      opacity: 0,
      x: 40,
      duration: 0.9,
      delay: 0.1,
      ease: "power2.out"
    });

    // Page transitions are now handled by js/page-transitions.js
    if (typeof gsap !== 'undefined') {
      gsap.registerPlugin(ScrollTrigger);
    }
    
    // ===== CUSTOM CURSOR =====
    
    const cursor = document.querySelector('.custom-cursor');
    let mouseX = 0;
    let mouseY = 0;
    let cursorX = 0;
    let cursorY = 0;
    
    // Track mouse position
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });
    
    // Smooth cursor follow with GSAP - optimized with requestAnimationFrame
    let rafId = null;
    function updateCursor() {
      const dx = mouseX - cursorX;
      const dy = mouseY - cursorY;
      
      cursorX += dx * 0.2;
      cursorY += dy * 0.2;
      
      cursor.style.left = cursorX + 'px';
      cursor.style.top = cursorY + 'px';
      
      rafId = requestAnimationFrame(updateCursor);
    }
    updateCursor();
    
    // Detect hovering over interactive elements
    const interactiveElements = document.querySelectorAll('a, button, .case-card, .nav-link, .hero-pill, .dark-mode-toggle, .case-study-link');
    
    interactiveElements.forEach(element => {
      element.addEventListener('mouseenter', () => {
        document.body.classList.add('hovering-link');
      });
      
      element.addEventListener('mouseleave', () => {
        document.body.classList.remove('hovering-link');
      });
    });
  </script>

</body>
</html>
